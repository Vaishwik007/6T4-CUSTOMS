name: Apply Supabase migrations

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "scripts/apply-migrations.ts"
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Apply migrations
        run: npm run migrate
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
